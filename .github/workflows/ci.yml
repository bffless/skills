name: CI
# testing
on:
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate plugin.json
        run: |
          PLUGIN_JSON=plugins/bffless/.claude-plugin/plugin.json
          if [ ! -f "$PLUGIN_JSON" ]; then
            echo "Missing $PLUGIN_JSON"
            exit 1
          fi
          echo "$PLUGIN_JSON exists"
          cat "$PLUGIN_JSON" | python3 -m json.tool > /dev/null
          echo "$PLUGIN_JSON is valid JSON"

      - name: Validate marketplace.json
        run: |
          MARKETPLACE_JSON=.claude-plugin/marketplace.json
          if [ ! -f "$MARKETPLACE_JSON" ]; then
            echo "Missing $MARKETPLACE_JSON"
            exit 1
          fi
          cat "$MARKETPLACE_JSON" | python3 -m json.tool > /dev/null
          echo "$MARKETPLACE_JSON is valid JSON"

      - name: Validate skills
        run: |
          shopt -s nullglob
          skill_count=0
          skill_dirs=(plugins/bffless/skills/*/)
          if [ ${#skill_dirs[@]} -eq 0 ]; then
            echo "No skills found in plugins/bffless/skills/"
            exit 1
          fi
          for skill_dir in "${skill_dirs[@]}"; do
            if [ ! -f "${skill_dir}SKILL.md" ]; then
              echo "Missing SKILL.md in ${skill_dir}"
              exit 1
            fi
            head -1 "${skill_dir}SKILL.md" | grep -q "^---$" || {
              echo "Missing YAML frontmatter in ${skill_dir}SKILL.md"
              exit 1
            }
            skill_count=$((skill_count + 1))
          done
          echo "Validated ${skill_count} skills"
